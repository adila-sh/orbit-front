<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://assets.adila.co" crossorigin="anonymous" />
    <link
      rel="preload"
      href="https://assets.adila.co/fonts/adila-std/woff2/AdilaStd-Book.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <script>
      // SPA sem SSR: aplica o tema antes do primeiro paint para evitar flash.
      // Espelha a lógica do next-themes (chave "theme", classe .dark no <html>).
      (function () {
        try {
          var theme = localStorage.getItem("theme") || "system";
          var isDark =
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {
          /* localStorage indisponível — segue no tema padrão */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
