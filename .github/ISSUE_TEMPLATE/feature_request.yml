name: Feature request
description: Sugira uma melhoria ou nova funcionalidade
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema
      description: Qual dor ou necessidade motiva a proposta?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Solução proposta
      description: O que você gostaria que acontecesse.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
    validations:
      required: false
