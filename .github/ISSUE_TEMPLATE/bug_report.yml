name: Bug report
description: Relate um comportamento incorreto
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: O que aconteceu?
      description: Descreva o bug e o comportamento esperado.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Ambiente
      description: Navegador, SO, versão do Bun.
      placeholder: "Chrome 120, macOS 14, Bun 1.3"
    validations:
      required: false
